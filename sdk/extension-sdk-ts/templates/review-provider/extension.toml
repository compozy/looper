[extension]
name = "__EXTENSION_NAME__"
version = "__EXTENSION_VERSION__"
description = "Executable review provider starter extension"
min_compozy_version = "__COMPOZY_MIN_VERSION__"

[subprocess]
command = "node"
args = ["dist/src/index.js"]

[security]
capabilities = ["providers.register"]

[[providers.review]]
name = "__EXTENSION_NAME__-review"
kind = "extension"
